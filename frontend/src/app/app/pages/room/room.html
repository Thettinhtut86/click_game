<div class="page-wrapper">
    <div class="stripe stripe-1"></div>
    <div class="stripe stripe-2"></div>
    <div class="stripe stripe-3"></div>

    <div class="content-box">
        <h2>Room {{ roomId }}</h2>

        <div class="players">
            <div *ngFor="let p of players" class="player-bubble" [style.background]="p.color">
                {{ p.name }}
            </div>
        </div>

        <div class="actions">

            <div class="action-group">
                <div *ngIf="hostId && uid === hostId" class="host-actions">
                    <button class="btn primary" (click)="startGame()" [disabled]="players.length < 2">
                        Start Game
                    </button>
                </div>

                <p class="info-text" *ngIf="uid !== hostId">
                    Waiting for host to start...
                </p>
            </div>

            <div class="action-group">
                <button class="btn secondary" (click)="back()">
                    Back to Menu
                </button>
            </div>

        </div>
    </div>
</div>
