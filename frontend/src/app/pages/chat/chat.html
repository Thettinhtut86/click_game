<div class="chat-wrapper">

    <header class="chat-header">
        <h2>Daily Chat</h2>

        <div class="online-users">
            <div *ngFor="let u of onlineUsers" class="online-user">
                <div class="dot" [style.background]="u.color"></div>
                {{ u.name }}
            </div>
        </div>

        <button class="back-btn" (click)="back()">Back</button>
    </header>

    <div class="chat-box" #chatBox>

        <ng-container *ngFor="let msg of filteredMessages; let i = index">

            <div class="message" [class.message--mine]="msg.uid === uid" (click)="selectMessage(msg.id, $event)">

                <div class="message-content">

                    <!-- LEFT AVATAR -->
                    <div class="avatar" *ngIf="msg.uid !== uid && isFirstInGroup(i)" [style.background]="msg.color">
                        {{ msg.name.charAt(0).toUpperCase() }}
                    </div>

                    <div class="avatar-spacer" *ngIf="!isFirstInGroup(i)"></div>

                    <div class="body">

                        <div class="meta" *ngIf="isFirstInGroup(i)">
                            <span class="name" [style.color]="msg.color">
                                {{ msg.name }}
                            </span>
                            <span class="time">{{ msg.timestamp }}</span>
                        </div>

                        <div class="bubble-row">

                            <!-- REACTION BAR (ALL MESSAGES) -->
                            <div class="reaction-bar" *ngIf="openedMessageId === msg.id">

                                <button class="react-btn">👍</button>
                                <button class="react-btn">❤️</button>

                                <div class="menu-wrapper">

                                    <button class="menu-btn" (click)="toggleMenu(msg.id, $event)">
                                        ⋮
                                    </button>

                                    <div class="message-menu" *ngIf="openedMenuId === msg.id"
                                        (click)="$event.stopPropagation()">

                                        <button>Reply</button>
                                        <button *ngIf="!msg.deleted" (click)="deleteMessage(msg.id)">
                                            Delete
                                        </button>
                                        
                                        <button *ngIf="msg.deleted" (click)="restoreMessage(msg.id)">
                                            Undo Delete
                                        </button>

                                    </div>

                                </div>

                            </div>

                            <div class="bubble" *ngIf="!msg.deleted">
                                {{ msg.text }}
                            </div>

                            <div class="bubble" *ngIf="msg.deleted">
                                Message deleted
                            </div>

                        </div>

                    </div>

                    <!-- RIGHT AVATAR (YOU) -->
                    <div class="avatar mine-avatar" *ngIf="msg.uid === uid && isFirstInGroup(i)"
                        [style.background]="msg.color">
                        {{ msg.name.charAt(0).toUpperCase() }}
                    </div>

                </div>
            </div>

        </ng-container>

    </div>

    <div class="typing-box" *ngIf="typingUsers.length">
        <span>{{ typingUsers.join(', ') }} typing...</span>
    </div>

    <div class="chat-input">
        <input [(ngModel)]="chatText" (input)="onTyping()" (keydown.enter)="sendMessage()" />

        <button (click)="sendMessage()">Send</button>
    </div>

</div>
