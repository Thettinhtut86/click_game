<div class="menu-container">
    <div class="user-bubble" [style.background]="color"></div>
    <h3>Welcome, {{name}}</h3>
    
    <button (click)="createRoom()" [class.active]="selectedIndex === 0">
        <span class="arrow" *ngIf="selectedIndex === 0">▶</span>
        Create Room
    </button>
    
    <button (click)="joinRoom()" [class.active]="selectedIndex === 1">
        <span class="arrow" *ngIf="selectedIndex === 1">▶</span>
        Join Room
    </button>
    
    <button class="chat-btn" (click)="allChat()" [class.active]="selectedIndex === 2">
        <span class="arrow" *ngIf="selectedIndex === 2">▶</span>
        Daily Chat
        <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
    </button>
    
    <button (click)="logout()" [class.active]="selectedIndex === 3">
        <span class="arrow" *ngIf="selectedIndex === 3">▶</span>
        Logout
    </button>
</div>
